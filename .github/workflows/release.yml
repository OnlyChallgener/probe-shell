name: Release

# Safe Windows-only release workflow for Probe Shell.
# It intentionally builds only the portable Windows x86_64 ZIP to reduce release
# failures while the project is still moving quickly.

"on":
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-x86_64:
    name: windows-x86_64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-x86_64

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME
          } else {
            $version = "dev-$env:GITHUB_RUN_NUMBER"
          }

          $stage = "probe-shell-$version-windows-x86_64"
          $releaseDir = "target/x86_64-pc-windows-msvc/release"
          $exe = Join-Path $releaseDir "probe-shell.exe"

          if (-not (Test-Path $exe)) {
            Write-Host "probe-shell.exe was not found. Build output directory:"
            if (Test-Path $releaseDir) {
              Get-ChildItem $releaseDir | Format-Table Name, Length, LastWriteTime
            }
            throw "Missing expected binary: $exe"
          }

          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item $exe $stage
          Copy-Item README.md, README.en.md, CHANGELOG.md $stage -ErrorAction SilentlyContinue

          $asset = "$stage.zip"
          if (Test-Path $asset) { Remove-Item $asset -Force }
          Compress-Archive -Path $stage -DestinationPath $asset -Force
          "ASSET=$asset" >> $env:GITHUB_ENV

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: ${{ env.ASSET }}

      - name: Attach ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
